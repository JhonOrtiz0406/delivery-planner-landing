services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Dokploy inyecta estas variables desde su panel de env vars
        PUBLIC_WHATSAPP_NUMBER: ${PUBLIC_WHATSAPP_NUMBER:-573001234567}
        PUBLIC_DEMO_URL: ${PUBLIC_DEMO_URL:-https://delivery-planner.bystepsolutions.tech}
    restart: unless-stopped
    ports:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      # ── Traefik / Dokploy ──────────────────────────────────────────────────
      - "traefik.enable=true"

      # Ruta principal con www
      - "traefik.http.routers.landing.rule=Host(`www.delivery-planner.bystepsolutions.tech`)"
      - "traefik.http.routers.landing.entrypoints=websecure"
      - "traefik.http.routers.landing.tls=true"
      - "traefik.http.routers.landing.tls.certresolver=letsencrypt"
      - "traefik.http.services.landing.loadbalancer.server.port=80"

      # Redirect de dominio sin www → con www
      - "traefik.http.routers.landing-redirect.rule=Host(`delivery-planner.bystepsolutions.tech`)"
      - "traefik.http.routers.landing-redirect.entrypoints=websecure"
      - "traefik.http.routers.landing-redirect.tls=true"
      - "traefik.http.routers.landing-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.landing-redirect.middlewares=redirect-to-www"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.regex=^https://delivery-planner\\.bystepsolutions\\.tech/(.*)"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.replacement=https://www.delivery-planner.bystepsolutions.tech/$${1}"
      - "traefik.http.middlewares.redirect-to-www.redirectregex.permanent=true"
