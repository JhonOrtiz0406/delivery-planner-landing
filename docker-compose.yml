services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Dokploy inyecta estas variables desde su panel de env vars
        PUBLIC_WHATSAPP_NUMBER: ${PUBLIC_WHATSAPP_NUMBER:-573001234567}
        PUBLIC_DEMO_URL: ${PUBLIC_DEMO_URL:-https://delivery-planner.bystepsolutions.tech}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
networks:
  dokploy-network:
    external: true
